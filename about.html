<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AlignAsya PhysioTherapy & Wellness — Dr. Renu Saroj</title>
    <link rel="shortcut icon" type="image/x-icon" href="img/favicon.png" />
  <meta name="description"
    content="AlignAsya — Physiotherapy & Wellness center at Mira Road, Mumbai. Led by Dr. Renu Saroj. Pain relief, sports rehab, post-op rehab, women's health & holistic wellness." />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* small custom tweaks */
    .hero-bg {
      background: linear-gradient(90deg, rgba(16, 185, 129, 0.06), rgba(59, 130, 246, 0.04));
    }

    .aa-rounded-2xl {
      border-radius: 0 3rem 0 3rem;
    }

    .aa-blue {
      background-color: rgb(20 158 194);
    }

    .aa-green {
      background-color: rgb(120 169 50);
    }
    .topmenu{
    display: contents;
  }
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:5px 20px;
}

.menu-toggle{
    display:none;
    font-size:24px;
    cursor:pointer;
    background:none;
    border:none;
}

nav ul{
    display:flex;
    gap:25px;
    list-style:none;
}

.container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 40px;
}
.footer-top {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1fr;
    gap: 60px;
    padding-bottom: 30px;
    border-bottom: 1px solid rgba(167, 196, 199, 0.15);
}
.footer-col h5 {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: #9de13a;
    margin-bottom: 15px;
}
.footer-col a {
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
}

@media(max-width:768px){

.footer-top{
        grid-template-columns: 1fr;
    }
.menu-toggle{
    display:block;
}
.header{
    padding:0 20px;
    background-color: rgb(255 255 255 / 1) !important;
}

    .topmenu{
    display: flex;
  }
nav{
    display:none;
    position:absolute;
    top:70px;
    left:0;
    width:100%;
    background:#fff;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

nav.active{
    display:block;
}

nav ul{
    display:flex;
    gap: 15px;
    flex-direction:column;
    padding:20px;
    background-color: #31a9d3;
    color:#fff;
}

nav ul li{
    margin:5px 0;
        display: flex;
        font-size: medium;
}
nav ul li a{ 
    width: 100%;
}
.logo img{
    width: 11rem;
    height: auto;
  }
}
  </style>
</head>

<body class="antialiased text-gray-800 bg-white">
    AlignAsya  AlignAsya AlignAsyaAlignAsyaAlignAsyaAlignAsyaAlignAsyaAlignAsya
</body>

</html>
